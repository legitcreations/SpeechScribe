  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="Manage your profile and recordings with SpeechScribe, the ultimate voice transcription app.">
  <meta name="keywords" content="SpeechScribe, voice transcription, profile, recordings, audio, app">
  <meta name="author" content="Legitcreations">
  <meta name="robots" content="index, follow">
  <meta property="og:image" content="https://speechscribeapp.web.app/logo.jpg" />
  <meta property="og:url" content="https://speechscribeapp.web.app/login" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://speechscribeapp.web.app/profile" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <title>Profile | SpeechScribe</title>
  <link rel="stylesheet" href="/profile/profile.css">
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PJRZD4KN" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <header class="settingsHeader">
    <i onclick="window.history.back()" class="fas fa-arrow-left"></i>
    <p class="headerText">
      Profile
    </p>
  </header>
  <div class="alertContainer">
    <svg id="closeAlert" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24">
      <path fill="black"
        d="M20 3H4c-1.103 0-2 .897-2 2v14c0 1.103.897 2 2 2h16c1.103 0 2-.897 2-2V5c0-1.103-.897-2-2-2zM4 19V7h16l.001 12H4z" />
      <path fill="black"
        d="m15.707 10.707-1.414-1.414L12 11.586 9.707 9.293l-1.414 1.414L10.586 13l-2.293 2.293 1.414 1.414L12 14.414l2.293 2.293 1.414-1.414L13.414 13z" />
    </svg>
    <div class="alertBox">
      <img src="/img/alert.png" alt="alertImg" />
      <p id="alerHeader">
        ALERT
      </p>
      <p id="alertText" style="color: black; font-weight: 400;font-size:14px;"></p>
    </div>
  </div>
  <div class="profileContainer">
    <div class="userAbout">
      <p class="header">
        ABOUT ME
      </p>
      <p id="bio"></p>
    </div>
    <div id="spinnerBackground">
      <img src="/img/logo.jpg" alt="logo.jpg">
    </div>
    <div class="userImage">
      <i id="profilePhoto" class="fas fa-fade fa-image"></i>
    </div>
    <div class="userDetails">
      <p class="header">
        DETAILS
      </p>
      <div class="userAbout">
        <div>
          <i class="fa fa-envelope"></i>
          <p id="email"></p>
        </div>
        <div>
          <i class="fa fa-phone"></i>
          <p id="telephone"></p>
        </div>
        <div>
          <i class="fa fa-user-circle"></i>
          <p id="username"></p>
        </div>
        <div>
          <i class="fa fa-mars"></i>
          <p id="age"></p>
        </div>
        <div>
          <i class="fa fa-location-pin"></i>
          <p id="address"></p>
        </div>
      </div>
    </div>
  </div>

  <section id="editTab">
    <i class="fas fa-times"></i>
    <div>
      <input id="inputId" type="text" placeholder="type here...">
      <button id="saveFileNameButton">Save</button>
    </div>
  </section>

  <script type="module" src="/JAVASCRIPT/profile.js">
  </script>
  <script>
    function showmenu() {
      document.querySelector(".profileButton").classList.toggle("show");
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
</body>

</html>
