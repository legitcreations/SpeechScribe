<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/vov.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <title>studio</title>
</head>

<body>
    <header>
        <h2>SpeechScribe Studio</h2>
        <i onclick="openDialogue()" class="fas fa-plus"></i>
    </header>
    <div id="voiceDialogue">
        <div id="startNewSession">
            <i class="fas fa-plus"></i>
            <p>Start New Session</p>
        </div>
        <div onclick="synthesizeVoice()" id="test">
            <i class="fas fa-play"></i>
            <p>Test Sample</p>
        </div>
    </div>
    <div class="ttsSampleContainer">
        <div id="testSounds">
            <div id="neutral_male"></div>
            <div id="child_girl"></div>
            <div id="elderly_man" style="background-image: url('/img/oldman.png'); background-size: cover; background-position: center; text-align: center;">
                <p>Elderly man</p>
            </div>
            <div id="robot_ai"></div>
            <div id="robot_mechanical"></div>
            <div id="villian_deep"></div>
            <div id="villian_sinister"></div>
            <div id="fairy_soft"></div>
            <div id="alien_high_pitch"></div>
            <div id="alien_echoey"></div>
            <div id="chinesse_madarin"></div>
            <div id="monster_deep"></div>
            <div id="american_accent_casual"></div>
            <div id="british_accent_formal"></div>
        </div>
    </div>
    <div id="testSundPlayer">f</div>
    </div>
    <script src="/JAVASCRIPT/vox.js"></script>
</body>

</html>
