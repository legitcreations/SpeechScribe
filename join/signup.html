        <header>Sign up</header>
        <div class="background"></div>
        <main>
            <form class="signupForm" id="signupForm">
                <div id="usernameTab">
                    <i class="fa-regular fa-user"></i>
                    <span></span>
                    <input
                        placeholder="username"
                        id="username"
                        name="username"
                        type="text"
                    />
                </div>
                <div class="emailTab">
                    <i class="fa-regular fa-envelope"></i>
                    <span></span>
                    <input
                        placeholder="email"
                        type="email"
                        name="email"
                        id="email"
                    />
                </div>
                <div class="phoneTab">
                    <i class="fa fa-phone"></i>
                    <span></span>
                    <input placeholder="phone" type="tel" name="tel" id="tel" />
                </div>
                <div class="passwordTab">
                    <i class="fa-solid fa-lock"></i>
                    <span></span>
                    <input
                        placeholder="password"
                        type="password"
                        name="password"
                        id="password"
                    />
                </div>
                <div class="comfirmPasswordTab">
                    <i class="fa-solid fa-lock"></i>
                    <span></span>
                    <input
                        placeholder="retype password"
                        type="password"
                        name="confirmPassword"
                        id="confirmPassword"
                    />
                </div>
                <button id="signupButton" type="submit">Sign up</button>
            </form>
            <p class="loginLink">
                Already have an account?
                <a href="/login/login.html">&nbsp;Click here</a>
            </p>
        </main>
        <footer>

                    >Privacy policy</a
                ></span
            >
